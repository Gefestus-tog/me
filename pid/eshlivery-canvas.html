<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Эщливери — Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1B1E26; --ink-soft:#454B58; --muted:#8A909E;
  --bg:#E9ECEA; --card:#FFFFFF; --line:#E3E6E2; --line-soft:#EDEFEC;
  --coral:#FF5436; --coral-soft:#FFE7E0; --coral-ink:#B82C13;
  --teal:#0E7C66; --teal-soft:#D7EFE8; --teal-ink:#0A5A4A;
  --amber:#D88A0A; --amber-soft:#FBEED2;
  --violet:#5B4FC9; --violet-soft:#E6E3FA;
  --slate:#7C8290; --slate-soft:#E9EBEE;
  --dot:rgba(27,30,38,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--bg)}

/* ---- viewport / world ---- */
#viewport{position:fixed;inset:0;overflow:hidden;cursor:grab;
  background-color:var(--bg);
  background-image:radial-gradient(circle at center, var(--dot) 1.4px, transparent 1.6px);
  background-size:26px 26px;background-position:0 0;touch-action:none}
#viewport.grabbing{cursor:grabbing}
#world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;user-select:none}
#edges{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;z-index:0}

/* ---- node ---- */
.node{position:absolute;background:var(--card);border:1px solid var(--line);border-radius:16px;
  box-shadow:0 1px 2px rgba(27,30,38,.05),0 10px 30px rgba(27,30,38,.08);
  z-index:1;cursor:grab;overflow:hidden;transition:box-shadow .15s,border-color .15s}
.node:hover{box-shadow:0 2px 6px rgba(27,30,38,.08),0 20px 50px rgba(27,30,38,.14);border-color:#cfd3ce}
.node.drag{cursor:grabbing;box-shadow:0 30px 70px rgba(27,30,38,.22);z-index:50}
.nh{display:flex;align-items:center;gap:9px;padding:11px 16px;border-bottom:1px solid var(--line-soft)}
.nh .tag{width:9px;height:9px;border-radius:50%;flex:none}
.nh h3{font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;letter-spacing:-.015em;line-height:1.1}
.nh .kicker{font-family:'JetBrains Mono';font-size:9.5px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted);margin-left:auto;flex:none}
.nb{padding:14px 16px}
.nb.tight{padding:12px 16px}

/* shared bits */
.block-h{font-family:'JetBrains Mono';font-size:9.5px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);margin:2px 0 7px;display:flex;align-items:center;gap:6px}
.block-h .ic{width:5px;height:5px;border-radius:50%}
ul.clean{list-style:none}
ul.clean li{position:relative;padding-left:15px;font-size:12.5px;color:var(--ink-soft);margin-bottom:5px;line-height:1.4}
ul.clean li::before{content:"";position:absolute;left:0;top:7px;width:5px;height:5px;border-radius:2px;background:var(--bullet,var(--coral))}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{font-size:11px;background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:3px 9px;color:var(--ink-soft)}
.chip b{color:var(--ink);font-weight:600}
.avatar{width:42px;height:42px;border-radius:12px;flex:none;display:grid;place-items:center;
  font-family:'Bricolage Grotesque';font-weight:700;font-size:16px;color:#fff;letter-spacing:-.02em}
.role-pill{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono';font-size:9.5px;
  font-weight:600;padding:2px 8px;border-radius:30px;margin-top:4px;letter-spacing:.04em}
.persona-head{display:flex;gap:12px;align-items:center;margin-bottom:11px}
.persona-head h4{font-family:'Bricolage Grotesque';font-weight:700;font-size:16px;letter-spacing:-.02em;line-height:1.1}
.quote{background:var(--ink);color:#fff;border-radius:11px;padding:11px 14px 11px 30px;font-size:12.5px;
  font-style:italic;position:relative;margin-top:11px}
.quote::before{content:"”";font-family:'Bricolage Grotesque';position:absolute;left:11px;top:0;font-size:30px;color:var(--coral);font-style:normal}
.split{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* user story chips */
.us{display:flex;gap:9px;padding:8px 10px;border:1px solid var(--line);border-radius:10px;
  font-size:12px;color:var(--ink-soft);line-height:1.35;margin-bottom:7px}
.us:last-child{margin-bottom:0}
.us-id{font-family:'JetBrains Mono';font-weight:700;font-size:10.5px;color:var(--coral);
  background:var(--coral-soft);padding:1px 6px;border-radius:6px;height:fit-content;flex:none}
.us em{font-style:normal;color:var(--ink);font-weight:600}

/* criteria */
.crit{display:flex;gap:10px;margin-bottom:11px}
.crit:last-child{margin-bottom:0}
.crit-n{width:22px;height:22px;border-radius:7px;flex:none;display:grid;place-items:center;
  font-family:'JetBrains Mono';font-weight:700;font-size:11px;background:var(--teal-soft);color:var(--teal-ink)}
.crit .t{font-size:12.5px;color:var(--ink);font-weight:500;line-height:1.35}
.crit .c{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.35}

/* gwt */
.gwt{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:9px}
.gwt:last-child{margin-bottom:0}
.gwt-row{display:grid;grid-template-columns:62px 1fr;border-bottom:1px solid var(--line-soft);font-size:11.5px}
.gwt-row:last-child{border-bottom:none}
.gwt-k{font-family:'JetBrains Mono';font-weight:700;font-size:10px;padding:7px 10px;letter-spacing:.03em}
.g-given .gwt-k{background:var(--violet-soft);color:var(--violet)}
.g-when .gwt-k{background:var(--amber-soft);color:var(--amber)}
.g-then .gwt-k{background:var(--teal-soft);color:var(--teal-ink)}
.gwt-v{padding:7px 10px;color:var(--ink-soft);line-height:1.35}
.verdict{display:flex;align-items:center;gap:8px;margin-top:11px;padding:9px 12px;border-radius:9px;
  background:var(--teal);color:#fff;font-size:12px;font-weight:500}

/* sprint card */
.sp-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.sp-title{font-family:'Bricolage Grotesque';font-weight:700;font-size:13.5px;letter-spacing:-.01em;line-height:1.2}
.sp-badge{text-align:center;flex:none}
.sp-badge .n{font-family:'Bricolage Grotesque';font-weight:800;font-size:24px;color:var(--coral);line-height:1;letter-spacing:-.03em}
.sp-badge .l{font-family:'JetBrains Mono';font-size:8px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.invest-tag{display:inline-flex;font-family:'JetBrains Mono';font-size:10px;font-weight:600;
  padding:4px 9px;border-radius:7px;margin-top:9px;line-height:1.3}
.iv-ok{background:var(--teal-soft);color:var(--teal-ink)}
.iv-warn{background:var(--amber-soft);color:var(--amber)}
.color-red{color:#B82C13}

/* invest letters */
.iv-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.iv-cell{display:flex;gap:10px;align-items:flex-start}
.iv-cell .L{font-family:'Bricolage Grotesque';font-weight:800;font-size:24px;color:var(--coral);line-height:.9;flex:none;width:20px}
.iv-cell .w{font-family:'Bricolage Grotesque';font-weight:700;font-size:12.5px;letter-spacing:-.01em}
.iv-cell .w span{display:block;font-family:'JetBrains Mono';font-size:8.5px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.iv-cell .d{font-size:11px;color:var(--ink-soft);margin-top:3px;line-height:1.35}

/* team */
.member{margin-bottom:11px}
.member:last-child{margin-bottom:0}
.member .mh{display:flex;align-items:center;gap:9px;margin-bottom:5px}
.member .rn{width:22px;height:22px;border-radius:7px;background:var(--violet-soft);color:var(--violet);
  font-family:'JetBrains Mono';font-weight:700;font-size:11px;display:grid;place-items:center;flex:none}
.member h5{font-family:'Bricolage Grotesque';font-weight:700;font-size:13px;letter-spacing:-.01em}
.member p{font-size:11.5px;color:var(--ink-soft);padding-left:31px;line-height:1.4}

/* moscow */
.mos{margin-bottom:13px}
.mos:last-child{margin-bottom:0}
.mos-h{display:flex;justify-content:space-between;align-items:center;color:#fff;padding:7px 11px;
  border-radius:8px;font-family:'Bricolage Grotesque';font-weight:700;font-size:12.5px;margin-bottom:7px}
.mos-h .ct{font-family:'JetBrains Mono';font-weight:600;font-size:10px;background:rgba(255,255,255,.22);padding:1px 7px;border-radius:20px}
.mos-row{display:flex;justify-content:space-between;gap:8px;font-size:11.5px;color:var(--ink-soft);padding:3px 0}
.mos-row .uid{font-family:'JetBrains Mono';font-weight:600;font-size:10.5px;color:var(--ink);flex:none}
.mos-row .spx{font-family:'JetBrains Mono';font-size:10.5px;color:var(--muted);flex:none}
.m-must .mos-h{background:var(--coral)} .m-should .mos-h{background:var(--teal)}
.m-could .mos-h{background:var(--amber)} .m-wont .mos-h{background:var(--slate)}
.mos-note{font-size:11px;color:var(--ink-soft);line-height:1.4;padding-top:4px}

/* mvp / metrics */
.mvp-row{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--ink-soft);padding:5px 0;border-bottom:1px solid var(--line-soft)}
.mvp-row:last-child{border-bottom:none}
.mvp-row .ck{width:17px;height:17px;border-radius:5px;background:var(--teal);flex:none;display:grid;place-items:center}
.mvp-row .uid{font-family:'JetBrains Mono';font-weight:600;font-size:10.5px;color:var(--teal-ink);flex:none}
.calc{font-family:'JetBrains Mono';font-size:11.5px;color:var(--ink-soft);background:var(--bg);
  border:1px solid var(--line);border-radius:9px;padding:11px 13px;line-height:1.85}
.calc b{color:var(--coral);font-weight:600}
.bigstat{display:flex;align-items:baseline;gap:6px;margin-bottom:8px}
.bigstat .v{font-family:'Bricolage Grotesque';font-weight:800;font-size:34px;letter-spacing:-.03em;line-height:1;color:var(--coral)}
.bigstat .v small{font-size:14px;color:var(--ink-soft);font-family:'JetBrains Mono';font-weight:600}
.bigstat .l{font-size:11.5px;color:var(--muted)}
.bar{height:9px;border-radius:5px;overflow:hidden;display:flex;margin-top:9px}
.bar i{height:100%}
.lead{font-size:11.5px;color:var(--ink-soft);line-height:1.5}
.lead b{color:var(--ink);font-weight:600}
.note{background:var(--teal-soft);border:1px solid #BFE5DA;border-radius:10px;padding:11px 13px;font-size:11.5px;color:var(--teal-ink);line-height:1.45;margin-top:11px}
.note b{font-weight:700}

/* hero node */
.hero-node{background:var(--ink);color:#fff;border:none}
.hero-node .nb{padding:20px 20px 22px}
.hero-node .eyebrow{font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:#FFB3A4;font-weight:500}
.hero-node h1{font-family:'Bricolage Grotesque';font-weight:800;font-size:27px;letter-spacing:-.03em;line-height:1.03;margin:8px 0 9px}
.hero-node h1 .a{color:var(--coral)}
.hero-node p{font-size:12.5px;color:#C7CAD2;line-height:1.5}
.hstats{display:flex;flex-wrap:wrap;gap:16px;margin-top:16px}
.hstats .v{font-family:'Bricolage Grotesque';font-weight:700;font-size:21px;letter-spacing:-.02em}
.hstats .v span{font-size:11px;color:var(--coral);font-family:'JetBrains Mono'}
.hstats .l{font-size:9px;color:#9CA1AC;font-family:'JetBrains Mono';letter-spacing:.04em;text-transform:uppercase}

/* ---- toolbar ---- */
.toolbar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:100;display:flex;
  align-items:center;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:6px;box-shadow:0 8px 30px rgba(27,30,38,.16)}
.tbtn{border:none;background:transparent;width:34px;height:34px;border-radius:9px;cursor:pointer;
  display:grid;place-items:center;color:var(--ink-soft);transition:background .15s,color .15s}
.tbtn:hover{background:var(--bg);color:var(--ink)}
.tbtn svg{width:18px;height:18px}
.zoom-lvl{font-family:'JetBrains Mono';font-size:12px;font-weight:600;color:var(--ink);min-width:50px;
  text-align:center;cursor:pointer;padding:0 4px;user-select:none}
.tsep{width:1px;height:22px;background:var(--line);margin:0 3px}
.tlabel{font-family:'JetBrains Mono';font-size:11px;color:var(--muted);padding:0 8px;letter-spacing:.02em}

/* ---- header badge ---- */
.brand{position:fixed;top:18px;left:18px;z-index:100;display:flex;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--line);border-radius:13px;padding:8px 14px 8px 8px;
  box-shadow:0 6px 20px rgba(27,30,38,.10)}
.brand .mk{width:34px;height:34px;border-radius:10px;background:var(--coral);display:grid;place-items:center;flex:none;box-shadow:0 4px 12px rgba(255,84,54,.34)}
.brand .mk svg{width:19px;height:19px}
.brand .nm{font-family:'Bricolage Grotesque';font-weight:700;font-size:16px;letter-spacing:-.02em;line-height:1.05}
.brand .nm small{display:block;font-family:'JetBrains Mono';font-weight:500;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

.hint{position:fixed;top:18px;right:18px;z-index:100;background:rgba(27,30,38,.86);color:#fff;
  font-size:11.5px;border-radius:11px;padding:9px 13px;line-height:1.5;max-width:240px;backdrop-filter:blur(6px);
  font-family:'JetBrains Mono';transition:opacity .4s}
.hint b{color:#FFB3A4}
.hint.hide{opacity:0;pointer-events:none}

/* ---- minimap ---- */
.minimap{position:fixed;bottom:18px;right:18px;z-index:100;width:210px;height:150px;background:rgba(255,255,255,.7);
  border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 8px 24px rgba(27,30,38,.14);backdrop-filter:blur(4px)}
.minimap .mm-node{position:absolute;background:var(--coral);border-radius:2px;opacity:.5}
.minimap .mm-view{position:absolute;border:1.6px solid var(--ink);border-radius:3px;background:rgba(27,30,38,.06)}

@media (max-width:680px){
  .hint{display:none}.minimap{width:140px;height:100px}
  .brand .nm small{display:none}
}
</style>
</head>
<body>

<div class="brand">
  <div class="mk"><svg viewBox="0 0 24 24" fill="none"><path d="M3 13l2-6h9l3 4h4v5h-2a2.5 2.5 0 11-5 0H10a2.5 2.5 0 11-5 0H3v-3z" stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/><circle cx="7.5" cy="16" r="1.6" fill="#fff"/><circle cx="16.5" cy="16" r="1.6" fill="#fff"/></svg></div>
  <div class="nm">Эщливери<small>Project Canvas</small></div>
</div>

<div class="hint" id="hint"><b>Тяни</b> пустое поле — пан · <b>Колесо</b> — зум · тяни ноду — двигать</div>

<div id="viewport">
  <div id="world">
    <svg id="edges">
      <defs>
        <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#B9BEC4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
    </svg>
  </div>
</div>

<div class="minimap" id="minimap"><div class="mm-view" id="mmView"></div></div>

<div class="toolbar">
  <button class="tbtn" id="zoomOut" title="Отдалить"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
  <span class="zoom-lvl" id="zoomLvl" title="Сбросить зум">100%</span>
  <button class="tbtn" id="zoomIn" title="Приблизить"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
  <div class="tsep"></div>
  <button class="tbtn" id="fitBtn" title="Показать всё"><svg viewBox="0 0 24 24" fill="none"><path d="M4 9V5a1 1 0 011-1h4M20 9V5a1 1 0 00-1-1h-4M4 15v4a1 1 0 001 1h4M20 15v4a1 1 0 01-1 1h-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  <span class="tlabel">Scrum board · Эщливери</span>
</div>

<script>
/* ============================================================
   ДАННЫЕ ХОЛСТА — все ноды и связи задаются здесь, в коде
   ============================================================ */
const ICoral='var(--coral)', ITeal='var(--teal)', IViolet='var(--violet)', IAmber='var(--amber)', ISlate='var(--slate)';

const NODES = [
  /* --- HERO --- */
  { id:'hero', x:1500, y:0, w:330, cls:'hero-node', raw:`
    <div class="nb">
      <span class="eyebrow">Студенческий проект · Scrum</span>
      <h1>Доставка до двери<br>за <span class="a">20 минут</span></h1>
      <p>Кампусный сервис: студент собирает корзину и получает заказ у комнаты; курьер берёт заказы в «окнах» между парами.</p>
      <div class="hstats">
        <div><div class="v">6<span>нед</span></div><div class="l">MVP</div></div>
        <div><div class="v">15<span>SP</span></div><div class="l">Velocity</div></div>
        <div><div class="v">3</div><div class="l">Спринта</div></div>
        <div><div class="v">5</div><div class="l">Команда</div></div>
      </div>
    </div>`},

  /* --- PERSONAS --- */
  { id:'maxim', x:1830, y:300, w:340, head:['Заказчик','PERSONA',ICoral], body:`
    <div class="persona-head">
      <div class="avatar" style="background:linear-gradient(135deg,#FF7A5C,#FF5436)"><img src="max.png" alt="max" height="42px"></div>
      <div><h4>Максим Зданович</h4>
        <span class="role-pill" style="background:var(--coral-soft);color:var(--coral-ink)">● ЗАКАЗЧИК · 19 · 2 курс</span></div>
    </div>
    <div class="chips"><span class="chip">плотное расписание</span><span class="chip">без машины</span><span class="chip">ограниченный бюджет</span></div>
    <div class="split">
      <div><div class="block-h"><span class="ic" style="background:var(--teal)"></span>Needs</div>
        <ul class="clean" style="--bullet:var(--teal)"><li>Получать заказ не выходя из корпуса</li><li>Экономить время на учёбу</li></ul></div>
      <div><div class="block-h"><span class="ic" style="background:var(--violet)"></span>Мотивация</div>
        <ul class="clean" style="--bullet:var(--violet)"><li>Заказ у двери, а не на КПП</li><li>Платить меньше крупных сервисов</li><li>Быстро, между парами</li></ul></div>
    </div>
    <div class="block-h" style="margin-top:10px"><span class="ic" style="background:var(--coral)"></span>Боли</div>
    <ul class="clean"><li>Дорогая доставка крупных сервисов</li><li>Везут только до КПП</li><li>Нет времени идти в магазин вечером</li></ul>
    <div class="quote">Хочу заказать и получить у двери за 20 минут, и недорого.</div>`},

  { id:'leon', x:1160, y:300, w:340, head:['Курьер','PERSONA',ITeal], body:`
    <div class="persona-head">
      <div class="avatar" style="background:linear-gradient(135deg,#16A085,#0E7C66)"><img src="leon.png" alt="max" height="42px"></div>
      <div><h4>Леон Завгородний</h4>
        <span class="role-pill" style="background:var(--teal-soft);color:var(--teal-ink)">● КУРЬЕР · 20 · 3 курс IT</span></div>
    </div>
    <div class="chips"><span class="chip">«окна» между парами</span><span class="chip">без жёсткого графика</span></div>
    <div class="split">
      <div><div class="block-h"><span class="ic" style="background:var(--teal)"></span>Needs</div>
        <ul class="clean" style="--bullet:var(--teal)"><li>Зарабатывать рядом с домом</li><li>Получить IT / командный опыт</li></ul></div>
      <div><div class="block-h"><span class="ic" style="background:var(--violet)"></span>Мотивация</div>

const mmView=document.getElementById('mmView');

let scale=1, tx=0, ty=0;
const MIN=.18, MAX=2.4;
const elById={};

// --- build nodes ---
NODES.forEach(n=>{
  const el=document.createElement('div');
  el.className='node'+(n.cls?(' '+n.cls):'');
  el.style.left=n.x+'px'; el.style.top=n.y+'px'; el.style.width=n.w+'px';
  el.dataset.id=n.id;
  let html='';
  if(n.raw){ html=n.raw; }
  else{
    const hd=n.headFix||n.head;
    html=`<div class="nh"><span class="tag" style="background:${hd[2]}"></span><h3>${hd[0]}</h3><span class="kicker">${hd[1]}</span></div><div class="nb">${n.body}</div>`;
  }
  el.innerHTML=html;
  world.appendChild(el);
  elById[n.id]=el;
  makeDraggable(el);
});

// --- transform ---
function applyTransform(){
  world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  viewport.style.backgroundSize=(26*scale)+'px '+(26*scale)+'px';
  viewport.style.backgroundPosition=tx+'px '+ty+'px';
  zoomLvl.textContent=Math.round(scale*100)+'%';
  updateMinimap();
}

// --- pan ---
let panning=false, panSX=0, panSY=0, panTX=0, panTY=0;
viewport.addEventListener('pointerdown', e=>{
  if(e.target.closest('.node')) return;
  panning=true; viewport.classList.add('grabbing');
  panSX=e.clientX; panSY=e.clientY; panTX=tx; panTY=ty;
  viewport.setPointerCapture(e.pointerId);
});
viewport.addEventListener('pointermove', e=>{
  if(!panning) return;
  tx=panTX+(e.clientX-panSX); ty=panTY+(e.clientY-panSY);
  applyTransform();
});
viewport.addEventListener('pointerup', e=>{ panning=false; viewport.classList.remove('grabbing'); });
viewport.addEventListener('pointercancel', ()=>{ panning=false; viewport.classList.remove('grabbing'); });

// --- zoom on wheel ---
viewport.addEventListener('wheel', e=>{
  e.preventDefault();
  const r=viewport.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const factor=Math.exp(-e.deltaY*0.0015);
  const ns=Math.min(MAX,Math.max(MIN,scale*factor));
  const wx=(mx-tx)/scale, wy=(my-ty)/scale;
  tx=mx-wx*ns; ty=my-wy*ns; scale=ns;
  applyTransform();
  hideHint();
},{passive:false});

// --- node drag ---
function makeDraggable(el){
  let dragging=false, sx=0, sy=0, ox=0, oy=0;
  el.addEventListener('pointerdown', e=>{
    e.stopPropagation();
    dragging=true; el.classList.add('drag');
    sx=e.clientX; sy=e.clientY; ox=parseFloat(el.style.left); oy=parseFloat(el.style.top);
    el.setPointerCapture(e.pointerId);
    hideHint();
  });
  el.addEventListener('pointermove', e=>{
    if(!dragging) return;
    el.style.left=(ox+(e.clientX-sx)/scale)+'px';
    el.style.top=(oy+(e.clientY-sy)/scale)+'px';
    renderEdges();
  });
  const end=()=>{ if(dragging){dragging=false; el.classList.remove('drag'); updateMinimap();} };
  el.addEventListener('pointerup', end);
  el.addEventListener('pointercancel', end);
}

// --- edges ---
function anchors(a,b){
  const ax=a.offsetLeft, ay=a.offsetTop, aw=a.offsetWidth, ah=a.offsetHeight;
  const bx=b.offsetLeft, by=b.offsetTop, bw=b.offsetWidth, bh=b.offsetHeight;
  const acx=ax+aw/2, acy=ay+ah/2, bcx=bx+bw/2, bcy=by+bh/2;
  const dx=bcx-acx, dy=bcy-acy;
  let p1,p2,c1,c2;
  if(Math.abs(dx)>=Math.abs(dy)){ // horizontal dominant
    if(dx>=0){ p1=[ax+aw,acy]; p2=[bx,bcy]; } else { p1=[ax,acy]; p2=[bx+bw,bcy]; }
    const k=Math.max(40,Math.abs(p2[0]-p1[0])*0.45);
    c1=[p1[0]+(dx>=0?k:-k),p1[1]]; c2=[p2[0]+(dx>=0?-k:k),p2[1]];
  }else{ // vertical dominant
    if(dy>=0){ p1=[acx,ay+ah]; p2=[bcx,by]; } else { p1=[acx,ay]; p2=[bcx,by+bh]; }
    const k=Math.max(40,Math.abs(p2[1]-p1[1])*0.45);
    c1=[p1[0],p1[1]+(dy>=0?k:-k)]; c2=[p2[0],p2[1]+(dy>=0?-k:k)];
  }
  return {p1,p2,c1,c2};
}
function renderEdges(){
  // clear old paths (keep defs)
  [...svg.querySelectorAll('path.edge')].forEach(p=>p.remove());
  EDGES.forEach(([f,t])=>{
    const a=elById[f], b=elById[t];
    if(!a||!b) return;
    const {p1,p2,c1,c2}=anchors(a,b);
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','edge');
    path.setAttribute('d',`M ${p1[0]} ${p1[1]} C ${c1[0]} ${c1[1]}, ${c2[0]} ${c2[1]}, ${p2[0]} ${p2[1]}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','#C3C8CE');
    path.setAttribute('stroke-width','2');
    path.setAttribute('stroke-linecap','round');
    path.setAttribute('marker-end','url(#arrow)');
    svg.appendChild(path);
  });
}

// --- bounding box of all nodes ---
function bbox(){
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  NODES.forEach(n=>{
    const el=elById[n.id];
    const x=el.offsetLeft, y=el.offsetTop, w=el.offsetWidth, h=el.offsetHeight;
    minX=Math.min(minX,x); minY=Math.min(minY,y);
    maxX=Math.max(maxX,x+w); maxY=Math.max(maxY,y+h);
  });
  return {minX,minY,maxX,maxY,w:maxX-minX,h:maxY-minY};
}

// --- fit to screen ---
function fit(pad=80){
  const bb=bbox();
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  const s=Math.min((vw-pad*2)/bb.w,(vh-pad*2)/bb.h);
  scale=Math.min(MAX,Math.max(MIN,s));
  tx=(vw-bb.w*scale)/2 - bb.minX*scale;
  ty=(vh-bb.h*scale)/2 - bb.minY*scale;
  applyTransform();
}

// --- zoom buttons (toward viewport center) ---
function zoomBy(factor){
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  const mx=vw/2, my=vh/2;
  const ns=Math.min(MAX,Math.max(MIN,scale*factor));
  const wx=(mx-tx)/scale, wy=(my-ty)/scale;
  tx=mx-wx*ns; ty=my-wy*ns; scale=ns; applyTransform();
}
document.getElementById('zoomIn').onclick=()=>zoomBy(1.2);
document.getElementById('zoomOut').onclick=()=>zoomBy(1/1.2);
document.getElementById('fitBtn').onclick=()=>fit();
zoomLvl.onclick=()=>{ // reset to 100% centered on bbox center
  const bb=bbox(), vw=viewport.clientWidth, vh=viewport.clientHeight;
  scale=1; tx=vw/2-(bb.minX+bb.w/2); ty=vh/2-(bb.minY+bb.h/2); applyTransform();
};

// --- minimap ---
let mmScale=1, mmBB=null;
function buildMinimap(){
  [...minimap.querySelectorAll('.mm-node')].forEach(e=>e.remove());
  mmBB=bbox();
  const pad=40;
  const W=minimap.clientWidth, H=minimap.clientHeight;
  mmScale=Math.min((W-12)/(mmBB.w+pad*2),(H-12)/(mmBB.h+pad*2));
  const offX=(W-(mmBB.w+pad*2)*mmScale)/2, offY=(H-(mmBB.h+pad*2)*mmScale)/2;
  minimap._off={x:offX,y:offY,padX:mmBB.minX-pad,padY:mmBB.minY-pad};
  NODES.forEach(n=>{
    const el=elById[n.id];
    const d=document.createElement('div'); d.className='mm-node';
    d.style.left=(offX+(el.offsetLeft-minimap._off.padX)*mmScale)+'px';
    d.style.top=(offY+(el.offsetTop-minimap._off.padY)*mmScale)+'px';
    d.style.width=Math.max(2,el.offsetWidth*mmScale)+'px';
    d.style.height=Math.max(2,el.offsetHeight*mmScale)+'px';
    if(n.id==='hero') d.style.background='var(--ink)';
    minimap.insertBefore(d,mmView);
  });
}
function updateMinimap(){
  if(!minimap._off) return;
  const o=minimap._off;
  // visible world rect
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  const wx=-tx/scale, wy=-ty/scale, ww=vw/scale, wh=vh/scale;
  mmView.style.left=(o.x+(wx-o.padX)*mmScale)+'px';
  mmView.style.top=(o.y+(wy-o.padY)*mmScale)+'px';
  mmView.style.width=(ww*mmScale)+'px';
  mmView.style.height=(wh*mmScale)+'px';
  // refresh node positions (after drag)
  const mnodes=minimap.querySelectorAll('.mm-node');
  NODES.forEach((n,i)=>{
    const el=elById[n.id], d=mnodes[i]; if(!d) return;
    d.style.left=(o.x+(el.offsetLeft-o.padX)*mmScale)+'px';
    d.style.top=(o.y+(el.offsetTop-o.padY)*mmScale)+'px';
  });
}

// --- hint ---
let hintTimer;
function hideHint(){ document.getElementById('hint').classList.add('hide'); clearTimeout(hintTimer); }
hintTimer=setTimeout(hideHint,5000);

// --- init (after fonts/layout settle) ---
function init(){
  renderEdges();
  buildMinimap();
  fit();
}
if(document.fonts&&document.fonts.ready){
  document.fonts.ready.then(()=>{ init(); setTimeout(()=>{renderEdges();buildMinimap();updateMinimap();},150); });
}else{ window.addEventListener('load',init); }
window.addEventListener('load',()=>setTimeout(init,200));
window.addEventListener('resize',()=>{ buildMinimap(); updateMinimap(); renderEdges(); });
</script>
</body>
</html>
